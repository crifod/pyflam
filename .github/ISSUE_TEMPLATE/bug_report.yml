name: Bug report
description: Report something that is broken or behaves incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do **not** report
        security issues here — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: "spread_field returns NaN ROS for fuel model 4 when ..."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: A small, self-contained snippet (and any small input file) that triggers it.
      render: python
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: Traceback / output
      description: The full error message or unexpected output. Paste as text.
      render: shell
  - type: input
    id: version
    attributes:
      label: pyflam version / commit
      placeholder: "0.1.0 or git commit hash"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      multiple: true
      options:
        - Rothermel surface / fuel models
        - Crown fire
        - MTT spread / burn probability
        - Spotting
        - Wind solver / CFD (OpenFOAM)
        - Atmosphere (GFS / ICON-2I / ERA5)
        - Landscape I/O (.lcp / GeoTIFF)
        - GUI (pyflam_gui)
        - Other / not sure
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and relevant package versions (numpy, rasterio, xarray, ...).
      placeholder: "macOS 14, Python 3.11, numpy 1.26, rasterio 1.3"
    validations:
      required: true
