name: Feature request
description: Suggest a new model, capability, or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that pyflam doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should pyflam do? Sketch the API or behavior if you can.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Fire-behavior science (surface / crown / spread / spotting)
        - Atmosphere / fire-weather forcing
        - Fire-atmosphere coupling (plume / CFD)
        - Landscape / data I/O
        - GUI (pyflam_gui)
        - Performance
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Papers, FlamMap behavior, or datasets that define the expected result.
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I would be willing to help implement this
