name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install pyflam and test dependencies
        # Core + dev + geo (rasterio) + the optional readers used by the
        # atmosphere / operative tests. OpenFOAM, Herbie/cfgrib (live GFS) and
        # cdsapi (ERA5) are intentionally NOT installed: those tests skip
        # themselves in CI (no solver / no network / no credentials).
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,geo]" xarray netcdf4 scikit-image pyproj

      - name: Run test suite with coverage
        run: pytest -q -p no:warnings --cov=pyflam --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: pyflam
          fail_ci_if_error: false        # don't fail the build if Codecov is down
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
